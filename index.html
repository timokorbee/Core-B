<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Core-B</title>
  <style>
    :root {
      color-scheme: light dark;
      --background: #15191c;
      --panel: #20272c;
      --text: #f5f7f8;
      --muted: #bcc5ca;
      --accent: #7dd3fc;
      --border: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(125, 211, 252, 0.08), transparent 45%),
        var(--background);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(680px, 100%);
      padding: 48px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.4rem, 8vw, 4.5rem);
      font-weight: 500;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0 0 32px;
      color: var(--muted);
      font-size: clamp(1.15rem, 3vw, 1.6rem);
      line-height: 1.4;
    }

    p {
      color: var(--muted);
      line-height: 1.65;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 22px;
      margin-top: 30px;
    }

    a {
      color: var(--accent);
      text-underline-offset: 4px;
    }

    footer {
      margin-top: 42px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 520px) {
      main {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Core-B</h1>
    <p class="subtitle">Independent apps and digital products</p>

    <p>
      Core-B creates simple and accessible digital products.
      Intermitter is a simple fasting timer for Android.
    </p>

    <nav aria-label="Contact and legal links">
      <a href="mailto:djcoreb@hotmail.com">Contact</a>
      <a href="https://timokorbee.github.io/intermitter-privacy/">
        Intermitter Privacy Policy
      </a>
    </nav>

	<footer>
	  <div>Core-B Data</div>
	  <div>DJ Core-B</div>
	  <div>Core-B Coloring</div>
	</footer>
  </main>
</body>
</html>
